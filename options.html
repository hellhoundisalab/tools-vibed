<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Choice Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar to maintain the minimalist aesthetic */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }

        /* Smooth standard easing */
        .ease-smooth { transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }

        /* --- Global Animations --- */
        
        /* Entrance animations */
        @keyframes slideInUp {
            0% { transform: translate(-50%, 100px); opacity: 0; }
            100% { transform: translate(-50%, 0); opacity: 1; }
        }
        @keyframes slideInRight {
            0% { transform: translate(100%, -50%); opacity: 0; }
            100% { transform: translate(0, -50%); opacity: 1; }
        }
        @keyframes slideInDown {
            0% { transform: translate(-50%, -100px); opacity: 0; }
            100% { transform: translate(-50%, -50%); opacity: 1; }
        }

        /* Exit animations */
        @keyframes slideOutUp {
            0% { transform: translate(-50%, -50%); opacity: 1; }
            100% { transform: translate(-50%, -150%); opacity: 0; }
        }
        @keyframes slideOutDown {
            0% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, 150%); opacity: 0; }
        }
        @keyframes slideOutRight {
            0% { transform: translate(0, -50%); opacity: 1; }
            100% { transform: translate(120%, -50%); opacity: 0; }
        }

        /* Result reveal */
        @keyframes revealInRight {
            0% { clip-path: inset(0 0 0 100%); opacity: 0; }
            100% { clip-path: inset(0 0 0 0); opacity: 1; }
        }
        .animate-reveal-in { animation: revealInRight 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

        @keyframes revealOutRight {
            0% { clip-path: inset(0 0 0 0); opacity: 1; }
            100% { clip-path: inset(0 0 0 100%); opacity: 0; }
        }
        .animate-reveal-out { animation: revealOutRight 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

        /* Animation class assignments */
        .entrance-stripes { animation: slideInUp 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @media (min-aspect-ratio: 1/1) {
            .entrance-stripes { animation: slideInRight 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        }

        .entrance-center { animation: slideInDown 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        .exit-stripes { animation: slideOutDown 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards !important; }
        @media (min-aspect-ratio: 1/1) {
            .exit-stripes { animation: slideOutRight 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards !important; }
        }
        .exit-center { animation: slideOutUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards !important; }

        /* --- Stripe Item Styling --- */
        .stripe-item {
            position: relative;
            overflow: hidden !important;
            transition: 
                transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                background-color 0.3s, 
                box-shadow 0.3s,
                margin 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backface-visibility: hidden;
            transform: translateZ(0);
        }

        .stripe-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background-color: #ffffff;
            z-index: 0;
            transition: width 0.9s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .winner-active::before { width: 100%; }

        /* --- Refined Industrial Glow --- */
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.3); }
            50% { box-shadow: 0 0 35px 12px rgba(255, 255, 255, 0.7); }
        }
        .glow-active {
            z-index: 100 !important;
            animation: glowPulse 1.2s ease-in-out infinite;
        }

        /* --- Subwoofer Circular Button Styling --- */
        
        /* The button itself pulses very slightly every 4 seconds */
        @keyframes verySubtlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* Shockwave rippling out every 4 seconds */
        @keyframes shockwaveSpread {
            0% { transform: scale(1); opacity: 0.5; border-width: 2px; }
            40% { opacity: 0.2; }
            100% { transform: scale(2.2); opacity: 0; border-width: 1px; }
        }

        #pick-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #e4e4e7;
            position: relative;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .btn-animation-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: verySubtlePulse 4s ease-in-out infinite;
        }

        /* Shockwave element */
        .btn-shockwave {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1px solid #e4e4e7;
            pointer-events: none;
            z-index: 1;
            animation: shockwaveSpread 4s cubic-bezier(0.165, 0.84, 0.44, 1) infinite;
        }

        /* Concentric ring element on hover */
        .pick-btn-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 4px solid black; 
            opacity: 0;
            transform: scale(0.8);
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1), opacity 0.4s ease;
            pointer-events: none;
            z-index: 3;
        }

        /* Core circle transition */
        .pick-btn-core {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: transparent;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 2;
        }

        /* Hover States */
        #pick-btn:not(:disabled):hover {
            background-color: #000000;
        }
        
        #pick-btn:not(:disabled):hover .pick-btn-ring {
            opacity: 1;
            transform: scale(1.25);
        }

        #pick-btn:not(:disabled):hover .pick-btn-core {
            transform: scale(0.55);
            background-color: black;
        }

        /* Hide shockwave on hover to keep interaction clean */
        #pick-btn:not(:disabled):hover ~ .btn-shockwave {
            display: none;
        }

        /* UI elements */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .blinking-placeholder::placeholder { animation: blink 1s step-end infinite; color: #000000; opacity: 0.3; }

        /* Responsive Layout Logic */
        :root { --stripe-slide: 0%; }

        #center-area {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            transition: opacity 0.3s;
        }

        #stripes-container {
            width: 95vw;
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(calc(-50% + var(--stripe-slide)));
            z-index: 5;
            max-height: 50vh;
            overflow-y: auto;
            overflow-x: visible;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), spacing 0.4s;
        }

        @media (min-aspect-ratio: 1/1) {
            #stripes-container {
                width: 40vw;
                min-width: 400px;
                top: 50%;
                bottom: auto;
                left: auto;
                right: -24px;
                transform: translateY(-50%) translateX(var(--stripe-slide));
                z-index: 50;
                max-height: 90vh;
            }
        }
    </style>
</head>
<body class="bg-white text-black font-mono selection:bg-black selection:text-white overflow-hidden">

    <!-- Top Navigation Strip -->
    <a id="back-link" href="/" class="fixed top-0 left-0 w-full h-[24px] bg-black text-white flex items-center justify-center text-sm tracking-widest z-[60] hover:bg-zinc-800 transition-colors">
        &lt;&lt;&lt;
    </a>

    <div class="relative min-h-screen">
        
        <!-- Central Action Area -->
        <div id="center-area" class="opacity-0 entrance-center">
            <div class="btn-animation-wrapper" id="btn-pulse-container">
                <button id="pick-btn" class="opacity-30 cursor-not-allowed" disabled title="Pick Random Choice">
                    <div class="pick-btn-core"></div>
                    <div class="pick-btn-ring"></div>
                </button>
                <div class="btn-shockwave" id="btn-shockwave"></div>
            </div>
        </div>

        <!-- Full Screen Result View -->
        <div id="fullscreen" class="absolute inset-0 z-40 hidden flex-col items-center justify-center cursor-pointer" onclick="hideFullscreen()">
            <h2 id="fullscreen-text" class="text-[15vw] md:text-[12vw] max-w-[80vw] leading-[0.85] font-black uppercase text-black text-center break-words px-4 mix-blend-darken"></h2>
        </div>
        
        <!-- The Editable Stripes -->
        <div id="stripes-container" class="flex flex-col -space-y-4 py-8 px-4 sm:px-0 sm:pl-12 opacity-0 entrance-stripes"></div>
    </div>

    <script>
        // Start with only the empty variant field
        let options = [""];
        let lastSelectedStripeIndex = null;
        let lastAction = null; 
        
        const MARATHON_COLORS = [
            '#00FFC2', '#FF00FF', '#00E5FF', '#FFEB3B', '#FF4081', '#7C4DFF', '#FF5252', '#18FFFF', '#76FF03', '#F4F4F5'
        ];

        const stripesContainer = document.getElementById('stripes-container');
        const pickBtn = document.getElementById('pick-btn');
        const btnPulseContainer = document.getElementById('btn-pulse-container');
        const btnShockwave = document.getElementById('btn-shockwave');
        const fullscreen = document.getElementById('fullscreen');
        const fullscreenText = document.getElementById('fullscreen-text');
        const centerArea = document.getElementById('center-area');
        const backLink = document.getElementById('back-link');

        const getColor = (index) => MARATHON_COLORS[index % MARATHON_COLORS.length];
        const isValidHex = (text) => /^#[0-9A-F]{3,6}$/i.test(text.trim());
        const getDisplayColor = (text, index) => isValidHex(text) ? text.trim() : getColor(index);
        const getValidItems = () => options.map((text, index) => ({ text: text.trim(), index })).filter(item => item.text !== '');

        // Remove entrance classes after they finish
        setTimeout(() => {
            centerArea.classList.remove('entrance-center');
            centerArea.style.opacity = "1";
            stripesContainer.classList.remove('entrance-stripes');
            stripesContainer.style.opacity = "1";
        }, 800);

        function updateCenterButton() {
            const valid = getValidItems().length >= 2;
            pickBtn.disabled = !valid;
            
            if (valid) {
                pickBtn.classList.remove('opacity-30', 'cursor-not-allowed');
                pickBtn.classList.add('cursor-pointer', 'opacity-100');
                btnPulseContainer.style.animationPlayState = 'running';
                btnShockwave.style.display = 'block';
            } else {
                pickBtn.classList.add('opacity-30', 'cursor-not-allowed');
                pickBtn.classList.remove('cursor-pointer', 'opacity-100');
                btnPulseContainer.style.animationPlayState = 'paused';
                btnShockwave.style.display = 'none';
            }
        }

        function renderStripes() {
            stripesContainer.innerHTML = '';
            options.forEach((opt, i) => {
                const isFilled = opt.trim() !== '';
                const stripe = document.createElement('div');
                stripe.id = `stripe-${i}`;
                stripe.className = `stripe-item flex items-stretch w-full rounded-2xl sm:rounded-r-none sm:rounded-l-2xl relative hover:-translate-x-[12px] ${lastAction === 'add' && i === options.length - 1 ? 'animate-stripe-in' : ''}`;
                stripe.style.zIndex = options.length - i;
                stripe.style.backgroundColor = isFilled ? getDisplayColor(opt, i) : '#f4f4f5';
                stripe.style.boxShadow = isFilled ? 'inset 0 1px 2px rgba(255,255,255,0.4), 0 4px 10px rgba(0,0,0,0.06)' : 'none';

                const input = document.createElement('input');
                input.type = "text";
                input.value = opt;
                input.placeholder = (i === options.length - 1) ? "_" : "";
                input.className = `w-full bg-transparent outline-none font-bold uppercase text-sm md:text-xl pl-8 pr-8 sm:pr-32 py-5 md:py-7 placeholder-black/30 text-black mix-blend-darken relative z-10 ${i === options.length - 1 ? 'blinking-placeholder' : ''}`;
                
                input.addEventListener('input', (e) => {
                    options[i] = e.target.value;
                    const filled = options[i].trim() !== "";
                    stripe.style.backgroundColor = filled ? getDisplayColor(options[i], i) : '#f4f4f5';
                    updateCenterButton();
                });

                input.addEventListener('paste', (e) => {
                    const lines = (e.clipboardData || window.clipboardData).getData('text').split(/\r?\n/).filter(l => l.trim() !== "");
                    if (lines.length > 1) {
                        e.preventDefault();
                        options.splice(i, 1, ...lines);
                        const nonEmpty = options.filter(o => o.trim() !== "");
                        options = [...nonEmpty, ""];
                        renderStripes();
                        updateCenterButton();
                        requestAnimationFrame(() => {
                            const inps = stripesContainer.querySelectorAll('input');
                            const target = Math.min(i + lines.length - 1, inps.length - 1);
                            if(inps[target]) inps[target].focus();
                        });
                    }
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const isLastSlot = (i === options.length - 1);
                        const hasContent = options[i].trim() !== '';

                        if (isLastSlot && hasContent) {
                            // If user is at the very last slot and it has text, add a new empty slot
                            lastAction = 'add';
                            options.push("");
                            renderStripes();
                            requestAnimationFrame(() => {
                                const inps = stripesContainer.querySelectorAll('input');
                                inps[i+1]?.focus();
                            });
                        } else if (!isLastSlot) {
                            // Just move focus to the next existing slot
                            stripesContainer.querySelectorAll('input')[i+1]?.focus();
                        }
                    } else if (e.key === 'Backspace' && !e.target.value && options.length > 1) {
                        e.preventDefault();
                        stripe.classList.add('animate-stripe-out');
                        setTimeout(() => {
                            options.splice(i, 1);
                            lastAction = 'remove';
                            renderStripes();
                            const inps = stripesContainer.querySelectorAll('input');
                            const target = Math.max(0, i - 1);
                            inps[target]?.focus();
                            updateCenterButton();
                        }, 200);
                    }
                });

                const inner = document.createElement('div');
                inner.className = "flex-1 flex items-center justify-start relative z-10";
                inner.appendChild(input);
                stripe.appendChild(inner);
                stripesContainer.appendChild(stripe);
            });
            lastAction = null;
        }

        stripesContainer.addEventListener('focusout', () => {
            setTimeout(() => {
                if (!stripesContainer.contains(document.activeElement)) {
                    options = [...options.filter(o => o.trim() !== ""), ""];
                    renderStripes();
                    updateCenterButton();
                }
            }, 100);
        });

        pickBtn.addEventListener('click', () => {
            const valid = getValidItems();
            if (valid.length < 2) return;
            document.activeElement?.blur();
            stripesContainer.style.pointerEvents = 'none';

            stripesContainer.style.setProperty('--stripe-slide', '60%');
            stripesContainer.classList.replace('-space-y-4', 'space-y-4');
            
            const winner = valid[Math.floor(Math.random() * valid.length)];
            const winStripe = document.getElementById(`stripe-${winner.index}`);
            if (winStripe) {
                winStripe.classList.add('glow-active', 'winner-active');
            }
            
            lastSelectedStripeIndex = winner.index;
            fullscreenText.textContent = winner.text;
            fullscreen.style.backgroundColor = getDisplayColor(winner.text, winner.index);
            fullscreen.classList.remove('hidden', 'animate-reveal-out');
            fullscreen.classList.add('flex', 'animate-reveal-in');
            centerArea.style.opacity = '0';
            centerArea.style.pointerEvents = 'none';
        });

        window.hideFullscreen = function() {
            fullscreen.classList.replace('animate-reveal-in', 'animate-reveal-out');
            centerArea.style.opacity = '1';
            centerArea.style.pointerEvents = 'auto';
            stripesContainer.style.pointerEvents = 'auto';
            
            const winStripe = document.querySelector('.winner-active');
            if (winStripe) {
                winStripe.classList.remove('glow-active', 'winner-active');
            }
            lastSelectedStripeIndex = null;

            stripesContainer.style.setProperty('--stripe-slide', '0%');
            stripesContainer.classList.replace('space-y-4', '-space-y-4');
            
            setTimeout(() => {
                fullscreen.classList.replace('flex', 'hidden');
            }, 400);
        };

        backLink.addEventListener('click', (e) => {
            e.preventDefault();
            const targetUrl = e.currentTarget.href;
            centerArea.classList.add('exit-center');
            stripesContainer.classList.add('exit-stripes');
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 500);
        });

        renderStripes();
        updateCenterButton();
    </script>
</body>
</html>
