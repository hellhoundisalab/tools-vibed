<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Keycard Palette</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            transition: background-color 0.5s ease;
        }

        /* Top Return Bar */
        .return-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 24px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 15px;
            z-index: 300;
            text-decoration: none;
            /* Entrance state */
            transform: translateY(-24px);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), background 0.2s ease;
        }

        body.is-loaded .return-bar {
            transform: translateY(0);
        }

        .return-bar:hover {
            background: #222;
        }

        .return-bar span {
            color: #fff;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            font-weight: 400;
        }

        /* Console Log Container - Top Left */
        #console-log {
            position: fixed;
            top: 45px; 
            left: 30px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            pointer-events: none;
            z-index: 200;
            /* Entrance state */
            opacity: 0;
            transform: translateX(-10px);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.is-loaded #console-log {
            opacity: 1;
            transform: translateX(0);
        }

        .console-item {
            font-size: 0.65rem;
            color: rgba(0, 0, 0, 0.4); 
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
        }

        .console-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .console-item.exit {
            opacity: 0;
            filter: blur(2px);
            transform: translateX(-5px);
        }

        /* Control Wrapper */
        .controls-wrapper {
            position: relative;
            z-index: 100;
            display: flex;
            gap: 1rem;
            margin-top: -30vh;
            /* Entrance state */
            opacity: 0;
            transform: translateY(30px);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease;
        }

        body.is-loaded .controls-wrapper {
            opacity: 1;
            transform: translateY(0);
        }

        /* Keycard Container */
        .palette-container {
            position: fixed;
            bottom: -380px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 2rem;
            width: fit-content;
        }

        /* The Keycard Main Container */
        .keycard {
            position: relative;
            width: 260px;
            height: 560px; 
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            margin-left: -140px;
            transform: translateY(600px); 
            z-index: 1;
            touch-action: none; 
            user-select: none;
        }

        .keycard.is-dragging {
            transition: none !important;
        }

        .keycard.is-active {
            transform: translateY(0);
        }

        .keycard.is-exiting {
            transform: translateY(700px) !important;
            opacity: 0;
        }

        .keycard:first-child {
            margin-left: 0;
        }

        /* Locked State: Subtle lift */
        .keycard.is-locked {
            transform: translateY(-15px);
        }

        /* The Card Face */
        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            box-shadow: -15px 0 40px rgba(0,0,0,0.06), 10px 0 30px rgba(0,0,0,0.03);
            transition: background-color 0.4s ease;
        }

        /* Black Connector Handle */
        .connector {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 40px;
            background: #121212;
            border-radius: 6px 6px 0 0;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding: 8px 15px 0 15px;
            clip-path: polygon(0% 20%, 15% 20%, 15% 0%, 85% 0%, 85% 20%, 100% 20%, 100% 100%, 0% 100%);
            z-index: 60;
            transition: background 0.3s ease;
        }

        .gold-strip {
            position: relative;
            width: 6px;
            height: 20px;
            background: linear-gradient(to bottom, #d4af37, #f1d592);
            border-radius: 1px;
            opacity: 0.8;
            overflow: hidden;
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }

        /* Locked Contact State */
        .keycard.is-locked .gold-strip {
            background: #4ade80 !important;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
            opacity: 1;
        }

        /* Running Glow Effect */
        .gold-strip::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.9), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .keycard:hover .gold-strip::after {
            opacity: 1;
            animation: goldRun 1.2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes goldRun {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        /* Hover Lift */
        .keycard.is-active:not(.is-exiting):not(.is-locked):hover {
            transform: translateY(-6px); 
        }

        /* Constrained Scratch Zone */
        .hex-zone {
            position: absolute;
            top: 95px; 
            left: 30px; 
            width: 22px; 
            height: 110px; 
            overflow: hidden;
            z-index: 15;
            pointer-events: none;
        }

        .scratch-bar {
            position: absolute;
            top: -220%; 
            left: 0;
            width: 100%;
            height: 260px; 
            background: #1a1a1a;
            opacity: 0;
        }

        .keycard.feedback .scratch-bar {
            animation: scratchLocalized 0.85s cubic-bezier(0.76, 0, 0.24, 1) forwards;
        }

        @keyframes scratchLocalized {
            0% { top: -220%; opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { top: 220%; opacity: 0; }
        }

        .card-index {
            position: absolute;
            left: 30px;
            top: 35px;
            font-size: 1.6rem;
            font-weight: 400;
            opacity: 0.35;
            z-index: 10;
        }

        .hex-code {
            position: absolute;
            top: 190px; 
            left: 30px;
            font-size: 1.1rem;
            letter-spacing: 0.2em;
            font-weight: 300;
            opacity: 0.25; 
            transform: rotate(-90deg);
            transform-origin: left top;
            white-space: nowrap;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .keycard:hover .hex-code {
            opacity: 0.9;
        }

        /* Industrial Buttons */
        .btn-industrial {
            position: relative;
            width: 140px; 
            height: 50px;
            border: 1px solid #e2e2e2;
            background: #ffffff;
            color: #1a1a1a;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .btn-passer {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            z-index: 5;
        }

        .btn-industrial.secondary {
            background: #1a1a1a;
            color: #ffffff;
            border-color: #1a1a1a;
        }

        .btn-industrial.secondary .btn-passer {
            background: #ffffff;
        }

        .btn-industrial.active-feedback .btn-passer {
            animation: scanHorizontal 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes scanHorizontal {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .btn-industrial:hover:not(.loading) {
            border-color: #1a1a1a;
        }

        .btn-industrial.secondary:hover:not(.loading) {
            background: #262626;
        }

        .btn-industrial.loading {
            cursor: wait;
            opacity: 0.6;
        }

        /* Shutdown Global Exit States */
        body.shutting-down {
            background-color: #f5f5f5;
        }

        body.shutting-down .controls-wrapper {
            transform: translateY(100px);
            opacity: 0;
        }

        body.shutting-down .return-bar {
            transform: translateY(-24px) !important;
        }

        body.shutting-down #console-log {
            opacity: 0;
            transform: translateY(-20px);
        }

        @media (max-width: 800px) {
            #console-log { top: 35px; left: 20px; }
            .controls-wrapper { gap: 0.5rem; margin-top: -15vh; }
            .btn-industrial { width: 100px; height: 44px; }
            .keycard { width: 140px; height: 400px; margin-left: -80px; }
            .connector { width: 80px; height: 30px; top: -15px; }
            .gold-strip { width: 4px; height: 12px; }
            .palette-container { bottom: -280px; }
            .keycard.is-active:not(.is-exiting):hover { transform: translateY(-4px); }
            .keycard.is-locked { transform: translateY(-8px) !important; }
            .card-index { top: 25px; left: 20px; font-size: 1.1rem; }
            .hex-code { top: 140px; left: 20px; font-size: 0.8rem; }
            .hex-zone { top: 65px; left: 20px; width: 20px; height: 80px; }
        }
    </style>
</head>
<body onclick="handleBackgroundClick(event)">

    <a href="/" class="return-bar" onclick="handleReturn(event)">
        <span><<<</span>
    </a>

    <div id="console-log"></div>

    <div class="controls-wrapper" id="controls">
        <button id="regenBtn" class="btn-industrial" onclick="handleRegenerate()">
            <div class="relative z-10">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 2v6h-6"></path>
                    <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                    <path d="M3 22v-6h6"></path>
                    <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
                </svg>
            </div>
            <div class="btn-passer"></div>
        </button>
        <button id="saveBtn" class="btn-industrial secondary" onclick="savePaletteToClipboard()">
            <div class="relative z-10">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 15v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </div>
            <div class="btn-passer"></div>
        </button>
    </div>

    <div class="palette-container" id="palette">
        <!-- Keycards managed by state -->
    </div>

    <script>
        const paletteContainer = document.getElementById('palette');
        const regenBtn = document.getElementById('regenBtn');
        const saveBtn = document.getElementById('saveBtn');
        const consoleLog = document.getElementById('console-log');
        
        let cardData = []; 
        let consoleTimeout;

        // --- NAVIGATION LOGIC ---

        function handleReturn(e) {
            e.preventDefault();
            const url = e.currentTarget.getAttribute('href');
            
            // Add shutdown class to body
            document.body.classList.add('shutting-down');
            
            // Trigger card exit animation for all cards
            const cards = Array.from(paletteContainer.children);
            cards.forEach((card, i) => {
                // Slightly staggered for mechanical feel
                setTimeout(() => card.classList.add('is-exiting'), i * 40);
            });

            updateConsole('System Shutdown Initiated');

            // Wait for animations to complete before navigating
            setTimeout(() => {
                window.location.href = url;
            }, 650);
        }

        // --- CORE LOGIC ---

        function generateHex() {
            const chars = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += chars[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        function getContrastYIQ(hexcolor){
            hexcolor = hexcolor.replace("#", "");
            var r = parseInt(hexcolor.substr(0,2),16);
            var g = parseInt(hexcolor.substr(2,2),16);
            var b = parseInt(hexcolor.substr(4,2),16);
            var yiq = ((r*299)+(g*587)+(b*114))/1000;
            return (yiq >= 128) ? 'black' : 'white';
        }

        function updateConsole(message) {
            const item = document.createElement('div');
            item.className = 'console-item';
            item.innerText = `> ${message}`;
            consoleLog.prepend(item);
            requestAnimationFrame(() => item.classList.add('visible'));
            setTimeout(() => {
                item.classList.add('exit');
                setTimeout(() => item.remove(), 600);
            }, 5000);
        }

        function triggerFeedback(el) {
            el.classList.remove('active-feedback', 'feedback');
            void el.offsetWidth; 
            el.classList.add(el.tagName === 'BUTTON' ? 'active-feedback' : 'feedback');
            setTimeout(() => el.classList.remove('active-feedback', 'feedback'), 900);
        }

        function copyText(text, el, message) {
            const temp = document.createElement('textarea');
            temp.value = text;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            if (el) triggerFeedback(el);
            if (message) updateConsole(message);
        }

        function setLockState(index, shouldLock) {
            if (cardData[index].locked === shouldLock) return;
            
            cardData[index].locked = shouldLock;
            const cardEl = paletteContainer.children[index];
            
            if (shouldLock) {
                cardEl.classList.add('is-locked');
                updateConsole('Card locked');
            } else {
                cardEl.classList.remove('is-locked');
                updateConsole('Card unlocked');
            }
        }

        function toggleLock(index) {
            setLockState(index, !cardData[index].locked);
        }

        function unlockAll() {
            let changed = false;
            cardData.forEach((card, i) => {
                if (card.locked) {
                    card.locked = false;
                    paletteContainer.children[i].classList.remove('is-locked');
                    changed = true;
                }
            });
            if (changed) updateConsole('Array unlocked');
        }

        function handleBackgroundClick(e) {
            // Prevent interference during shutdown
            if (document.body.classList.contains('shutting-down')) return;
            if (e.target === document.body) unlockAll();
        }

        function savePaletteToClipboard() {
            if (cardData.length === 0) return;
            const hexes = cardData.map(c => c.hex).join(', ');
            copyText(hexes, saveBtn, 'Copied array');
        }

        async function handleRegenerate() {
            if (regenBtn.classList.contains('loading')) return;
            regenBtn.classList.add('loading');
            triggerFeedback(regenBtn);
            
            const cards = Array.from(paletteContainer.children);
            cards.forEach((card, i) => {
                if (!cardData[i].locked) {
                    setTimeout(() => card.classList.add('is-exiting'), i * 30);
                }
            });

            await new Promise(r => setTimeout(r, 450));
            
            cardData = cardData.map(card => {
                if (card.locked) return card;
                return { hex: generateHex(), locked: false };
            });

            updatePaletteUI();
            updateConsole('Recalibrated');
            setTimeout(() => regenBtn.classList.remove('loading'), 600);
        }

        function updatePaletteUI() {
            const cards = Array.from(paletteContainer.children);
            cards.forEach((card, i) => {
                if (!cardData[i].locked) {
                    const data = cardData[i];
                    const contrast = getContrastYIQ(data.hex);
                    const face = card.querySelector('.card-face');
                    const hexLabel = card.querySelector('.hex-code');
                    const indexLabel = card.querySelector('.card-index');
                    const scratch = card.querySelector('.scratch-bar');

                    face.style.backgroundColor = data.hex;
                    hexLabel.innerText = data.hex;
                    hexLabel.style.color = indexLabel.style.color = (contrast === 'white' ? '#fff' : '#000');
                    scratch.style.backgroundColor = (contrast === 'white' ? '#121212' : '#000');
                    
                    card.classList.remove('is-exiting');
                }
            });
        }

        function createCard(data, i) {
            const contrast = getContrastYIQ(data.hex);
            const card = document.createElement('div');
            card.className = 'keycard';
            if (data.locked) card.classList.add('is-locked');
            
            let startY = 0;
            let startTime = 0;
            let startTarget = null;
            let isDragging = false;
            const lockPos = -15; 
            const dragLimit = 60; 

            card.addEventListener('pointerdown', (e) => {
                if (document.body.classList.contains('shutting-down')) return;
                startY = e.clientY;
                startTime = Date.now();
                startTarget = e.target;
                card.setPointerCapture(e.pointerId);
                card.classList.add('is-dragging');
                isDragging = true;
            });

            card.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                const deltaY = e.clientY - startY;
                const baseOffset = cardData[i].locked ? lockPos : 0;
                let newOffset = Math.max(Math.min(baseOffset + deltaY, dragLimit / 2), -dragLimit);
                card.style.transform = `translateY(${newOffset}px)`;
            });

            card.addEventListener('pointerup', (e) => {
                if (!isDragging) return;
                isDragging = false;
                card.classList.remove('is-dragging');
                card.style.transform = ''; 
                const diff = Math.abs(startY - e.clientY);
                if (diff > 20) {
                    toggleLock(i);
                } else if (Date.now() - startTime < 300) {
                    if (startTarget.closest('.connector')) toggleLock(i);
                    else copyText(data.hex, card, 'Copied hex');
                }
                card.releasePointerCapture(e.pointerId);
            });

            const cardFace = document.createElement('div');
            cardFace.className = 'card-face';
            cardFace.style.backgroundColor = data.hex;
            
            const hexZone = document.createElement('div');
            hexZone.className = 'hex-zone';
            const bar = document.createElement('div');
            bar.className = 'scratch-bar';
            bar.style.backgroundColor = contrast === 'white' ? '#121212' : '#000';
            hexZone.appendChild(bar);
            cardFace.appendChild(hexZone);

            const indexLabel = document.createElement('span');
            indexLabel.className = 'card-index';
            indexLabel.innerText = `0${i + 1}`;
            indexLabel.style.color = contrast === 'white' ? '#fff' : '#000';
            cardFace.appendChild(indexLabel);

            const hexLabel = document.createElement('span');
            hexLabel.className = 'hex-code';
            hexLabel.innerText = data.hex;
            hexLabel.style.color = contrast === 'white' ? '#fff' : '#000';
            cardFace.appendChild(hexLabel);

            card.appendChild(cardFace);

            const connector = document.createElement('div');
            connector.className = 'connector';
            for(let j=0; j<3; j++) {
                const strip = document.createElement('div');
                strip.className = 'gold-strip';
                connector.appendChild(strip);
            }
            card.appendChild(connector);

            return card;
        }

        function initializePalette() {
            paletteContainer.innerHTML = '';
            cardData = Array.from({ length: 6 }, () => ({ hex: generateHex(), locked: false }));
            
            cardData.forEach((data, i) => {
                const card = createCard(data, i);
                paletteContainer.appendChild(card);
                // Staggered card entrance: starts shortly after header/buttons
                setTimeout(() => card.classList.add('is-active'), i * 60 + 250);
            });

            // Trigger global UI entrance
            requestAnimationFrame(() => {
                document.body.classList.add('is-loaded');
            });

            setTimeout(() => updateConsole('Systems Online'), 800);
        }

        window.addEventListener('keydown', (e) => {
            if (document.body.classList.contains('shutting-down')) return;
            if (e.code === 'Space') {
                e.preventDefault();
                handleRegenerate();
            }
            if (e.key.toLowerCase() === 'c') savePaletteToClipboard();
        });

        window.onload = initializePalette;
    </script>
</body>
</html>
